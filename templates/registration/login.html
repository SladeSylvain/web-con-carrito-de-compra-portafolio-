{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="fw-bold mb-4 text-center">Iniciar Sesión</h1>

                    {% if form.errors %}
                    <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" id="{{ form.username.id_for_label }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
                            <div class="position-relative">
                                <input type="password" name="password" class="form-control pe-5 pass-input" id="{{ form.password.id_for_label }}" required>
                                <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3" style="cursor: pointer;" onclick="togglePass(this)"></i>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Entrar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePass(icono) {
    const input = icono.previousElementSibling;
    input.type = input.type === 'password' ? 'text' : 'password';
    icono.classList.toggle('bi-eye');
    icono.classList.toggle('bi-eye-slash');
}
</script>
{% endblock %}
