{% extends 'myfirstapp/base.html' %}

{% block content %}

<div class="container py-5">
    <div class="card border-0 shadow-lg mx-auto" style="max-width: 800px; border-radius: 15px; overflow: hidden;">
        <div class="row g-0">
            <!-- Sidebar del Perfil -->
            <div class="col-md-4 bg-primary text-white text-center py-5">
                <div class="mb-3">
                    <img src="https://ui-avatars.com/api/?name=Alexander+Carvajal&background=fff&color=0d6efd&size=128" 
                         class="rounded-circle shadow-sm border border-3 border-white" alt="Avatar">
                </div>
                <h4 class="fw-bold mb-0">Alexander Carvajal</h4>
                <p class="badge bg-white text-primary mt-2 px-3">Miembro VIP</p>
                <div class="mt-4 px-3">
                    <button class="btn btn-light btn-sm w-100 mb-2 rounded-pill fw-bold">Editar Perfil</button>
                    <button class="btn btn-outline-light btn-sm w-100 rounded-pill">Configuración</button>
                </div>
            </div>
            
            <!-- Información Detallada -->
            <div class="col-md-8">
                <div class="card-body p-4">
                    <h5 class="text-uppercase text-muted fw-bold mb-4 border-bottom pb-2">Información de la Cuenta</h5>
                    
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Correo Electrónico</div>
                        <div class="col-sm-8 fw-semibold">alex.carvajal@tech-mail.com</div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Total de Compras</div>
                        <div class="col-sm-8 fw-semibold">12 Pedidos realizados</div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Dirección</div>
                        <div class="col-sm-8 fw-semibold">Santiago, Chile [Sector Central]</div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted">Créditos Disponibles</div>
                        <div class="col-sm-8 fw-bold text-primary fs-5">$45.200</div>
                    </div>

                    <div class="d-flex gap-2 pt-3">
                        <button class="btn btn-primary px-4">Ver mis pedidos</button>
                        <button class="btn btn-outline-secondary px-4">Descargar Reporte</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
